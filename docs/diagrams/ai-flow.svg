  <polygon points="581,153 589,153 585,159" fill="#94A3B8"/>

  <rect x="495" y="162" width="180" height="38" rx="8" fill="#F97316" filter="url(#ash)"/>
  <text x="585" y="186" text-anchor="middle" fill="white" font-size="11" font-weight="600">🗄️ Collect All User Data</text>
  <line x1="585" y1="200" x2="585" y2="220" stroke="#94A3B8" stroke-width="1.5"/>
  <polygon points="581,220 589,220 585,226" fill="#94A3B8"/>

  <rect x="465" y="229" width="240" height="50" rx="8" fill="#A855F7" filter="url(#ash)"/>
