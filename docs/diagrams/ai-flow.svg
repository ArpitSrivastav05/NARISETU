<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 680" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="ahd" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="ash" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="780" height="680" rx="14" fill="#FAF5FF"/>
  <rect x="0" y="0" width="780" height="50" rx="14" fill="url(#ahd)"/>
  <rect x="0" y="25" width="780" height="25" fill="url(#ahd)"/>
  <text x="390" y="33" text-anchor="middle" fill="white" font-size="16" font-weight="700">🧠  AI Workflows — NariSetu Intelligence</text>

  <!-- ===== LEFT COLUMN: Voice Ledger Flow ===== -->
  <text x="195" y="80" text-anchor="middle" fill="#6D28D9" font-size="13" font-weight="700">Voice Ledger Pipeline</text>

  <rect x="105" y="95" width="180" height="38" rx="8" fill="#EF4444" filter="url(#ash)"/>
  <text x="195" y="119" text-anchor="middle" fill="white" font-size="11" font-weight="600">🎤 Voice Input (Hindi/English)</text>
  <line x1="195" y1="133" x2="195" y2="153" stroke="#94A3B8" stroke-width="1.5"/>
  <polygon points="191,153 199,153 195,159" fill="#94A3B8"/>

  <rect x="105" y="162" width="180" height="38" rx="8" fill="#F97316" filter="url(#ash)"/>
  <text x="195" y="186" text-anchor="middle" fill="white" font-size="11" font-weight="600">🔊 Browser Audio Recording</text>
  <line x1="195" y1="200" x2="195" y2="220" stroke="#94A3B8" stroke-width="1.5"/>
  <polygon points="191,220 199,220 195,226" fill="#94A3B8"/>

  <rect x="105" y="229" width="180" height="38" rx="8" fill="#A855F7" filter="url(#ash)"/>
  <text x="195" y="253" text-anchor="middle" fill="white" font-size="11" font-weight="600">🧠 Gemini 2.5 Flash</text>
  <line x1="195" y1="267" x2="195" y2="287" stroke="#94A3B8" stroke-width="1.5"/>
  <polygon points="191,287 199,287 195,293" fill="#94A3B8"/>

  <rect x="105" y="296" width="180" height="38" rx="8" fill="#3B82F6" filter="url(#ash)"/>
  <text x="195" y="320" text-anchor="middle" fill="white" font-size="11" font-weight="600">📋 JSON Extraction</text>
  <line x1="195" y1="334" x2="195" y2="354" stroke="#94A3B8" stroke-width="1.5"/>
  <polygon points="191,354 199,354 195,360" fill="#94A3B8"/>

  <rect x="105" y="363" width="180" height="38" rx="8" fill="#F59E0B" filter="url(#ash)"/>
  <text x="195" y="387" text-anchor="middle" fill="white" font-size="11" font-weight="600">🗄️ Firestore Storage</text>
  <line x1="195" y1="401" x2="195" y2="421" stroke="#94A3B8" stroke-width="1.5"/>
  <polygon points="191,421 199,421 195,427" fill="#94A3B8"/>

  <rect x="105" y="430" width="180" height="38" rx="8" fill="#10B981" filter="url(#ash)"/>
  <text x="195" y="454" text-anchor="middle" fill="white" font-size="11" font-weight="600">📊 Dashboard Update</text>

  <!-- ===== RIGHT COLUMN: Intelligence Feed Flow ===== -->
  <text x="585" y="80" text-anchor="middle" fill="#6D28D9" font-size="13" font-weight="700">Intelligence Feed Pipeline</text>

  <rect x="495" y="95" width="180" height="38" rx="8" fill="#1E293B" filter="url(#ash)"/>
  <text x="585" y="119" text-anchor="middle" fill="white" font-size="11" font-weight="600">👤 User Logs In</text>
