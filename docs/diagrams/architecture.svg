<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="frontendGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="authGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="backendGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="dbGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="aiGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="storageGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="680" rx="16" fill="#F8FAFC"/>
  <rect x="0" y="0" width="900" height="60" rx="16" fill="url(#headerGrad)"/>
  <rect x="0" y="30" width="900" height="30" fill="url(#headerGrad)"/>
  <text x="450" y="38" text-anchor="middle" fill="white" font-size="20" font-weight="700" letter-spacing="1">🏗️  NariSetu — System Architecture</text>

  <!-- Client Layer -->
  <rect x="270" y="80" width="360" height="70" rx="14" fill="url(#frontendGrad)" filter="url(#shadow)"/>
  <text x="450" y="108" text-anchor="middle" fill="white" font-size="13" font-weight="700">FRONTEND</text>
  <text x="450" y="128" text-anchor="middle" fill="#DBEAFE" font-size="11">React 19 · Vite · Tailwind CSS v4</text>

  <!-- Arrow down -->
  <line x1="450" y1="150" x2="450" y2="175" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="445,175 455,175 450,183" fill="#94A3B8"/>

  <!-- Auth Layer -->
  <rect x="270" y="185" width="360" height="55" rx="14" fill="url(#authGrad)" filter="url(#shadow)"/>
  <text x="450" y="210" text-anchor="middle" fill="white" font-size="13" font-weight="700">🔐 Firebase Authentication</text>
  <text x="450" y="226" text-anchor="middle" fill="#FEF3C7" font-size="10">Email/Password · Google OAuth · JWT Tokens</text>

  <!-- Arrow down -->
  <line x1="450" y1="240" x2="450" y2="265" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="445,265 455,265 450,273" fill="#94A3B8"/>

  <!-- Backend Layer -->
  <rect x="200" y="275" width="500" height="70" rx="14" fill="url(#backendGrad)" filter="url(#shadow)"/>
  <text x="450" y="303" text-anchor="middle" fill="white" font-size="14" font-weight="700">⚙️ Express.js Backend API</text>
  <text x="450" y="323" text-anchor="middle" fill="#D1FAE5" font-size="10">Node.js · REST API · Middleware · Controllers · Routes</text>

  <!-- Three arrows fanning out -->
  <line x1="320" y1="345" x2="160" y2="400" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="155,397 165,403 158,406" fill="#94A3B8"/>
  <line x1="450" y1="345" x2="450" y2="400" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="445,400 455,400 450,408" fill="#94A3B8"/>
  <line x1="580" y1="345" x2="740" y2="400" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="735,397 745,403 742,406" fill="#94A3B8"/>

  <!-- Firestore -->
  <rect x="50" y="410" width="220" height="100" rx="14" fill="url(#dbGrad)" filter="url(#shadow)"/>
  <text x="160" y="440" text-anchor="middle" fill="white" font-size="13" font-weight="700">🗄️ Cloud Firestore</text>
  <text x="160" y="458" text-anchor="middle" fill="#FED7AA" font-size="9">users · businesses · products</text>
  <text x="160" y="472" text-anchor="middle" fill="#FED7AA" font-size="9">transactions · savedSchemes</text>
  <text x="160" y="486" text-anchor="middle" fill="#FED7AA" font-size="9">schemeMatches · learningProgress</text>
  <text x="160" y="500" text-anchor="middle" fill="#FED7AA" font-size="9">certificates · aiInsights</text>

  <!-- Gemini AI -->
  <rect x="310" y="410" width="280" height="100" rx="14" fill="url(#aiGrad)" filter="url(#shadow)"/>
  <text x="450" y="440" text-anchor="middle" fill="white" font-size="13" font-weight="700">🧠 Google Gemini 2.5 Flash</text>
  <text x="450" y="460" text-anchor="middle" fill="#EDE9FE" font-size="9">AI Business Coach · Voice Ledger · Intelligence Feed</text>
  <text x="450" y="476" text-anchor="middle" fill="#EDE9FE" font-size="9">Product Optimizer · AI Tutor · Predictive Analytics</text>
  <text x="450" y="492" text-anchor="middle" fill="#EDE9FE" font-size="9">Business Roadmap · Smart Notifications</text>

  <!-- Firebase Storage -->
  <rect x="630" y="410" width="220" height="100" rx="14" fill="url(#storageGrad)" filter="url(#shadow)"/>
  <text x="740" y="440" text-anchor="middle" fill="white" font-size="13" font-weight="700">📁 Firebase Storage</text>
  <text x="740" y="460" text-anchor="middle" fill="#CCFBF1" font-size="9">Product Images</text>
  <text x="740" y="476" text-anchor="middle" fill="#CCFBF1" font-size="9">Business Profiles</text>
  <text x="740" y="492" text-anchor="middle" fill="#CCFBF1" font-size="9">User Avatars</text>

  <!-- Deployment Bar -->
  <rect x="50" y="545" width="800" height="55" rx="14" fill="#1E293B" filter="url(#shadow)"/>
  <text x="450" y="570" text-anchor="middle" fill="#94A3B8" font-size="10" font-weight="700" letter-spacing="2">DEPLOYMENT</text>
  <text x="250" y="588" text-anchor="middle" fill="#60A5FA" font-size="11" font-weight="600">▲ Vercel (Frontend)</text>
  <text x="450" y="588" text-anchor="middle" fill="#A78BFA" font-size="11" font-weight="600">🐙 GitHub (Source)</text>
  <text x="650" y="588" text-anchor="middle" fill="#34D399" font-size="11" font-weight="600">🟢 Render (Backend)</text>

  <!-- Arrows to deployment -->
  <line x1="160" y1="510" x2="160" y2="545" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="450" y1="510" x2="450" y2="545" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="740" y1="510" x2="740" y2="545" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Footer -->
  <text x="450" y="635" text-anchor="middle" fill="#94A3B8" font-size="9">Built by Arpit Srivastav · © 2025 NariSetu</text>
</svg>
